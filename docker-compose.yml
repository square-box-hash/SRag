services:
  srag:
    build: .
    image: srag:latest
    container_name: srag
    ports:
      - "8000:8000"
    environment:
      # HuggingFace token for model downloads (free at huggingface.co)
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      # Persist LanceDB sessions, ReputationStore, LexiconStore across restarts
      - srag_data:/app/srag_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: self-hosted SearXNG instance
  # SRag will auto-detect and use this as primary search if running
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    restart: unless-stopped
    profiles:
      # Only starts with: docker compose --profile searxng up
      - searxng

volumes:
  srag_data:
  searxng_data: